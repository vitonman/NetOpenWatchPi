<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=640, height=480, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>NetOpenWatchPi - Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#07120a;--panel:#0a1b0f;--line:#173d22;--text:#99ff9f;--dim:#56b35f;--warn:#ffd34d;--bad:#ff5f5f;}
    *{box-sizing:border-box}
    html,body{margin:0;width:640px;height:480px;overflow:hidden;background:var(--bg);color:var(--text);font-family:"VT323","Consolas",monospace}
    .safe{width:100%;height:100%;padding:12px}
    .screen{position:relative;width:100%;height:100%;border:2px solid var(--line);background:radial-gradient(circle at center,#0a1d10 0%,#061009 100%);padding:10px}
    .screen::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px)}
    .top{height:38px;border:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 8px;color:var(--dim);font-size:24px}
    .right{display:flex;align-items:center;gap:10px}
    .mail{display:none;border:1px solid var(--bad);padding:0 6px;color:var(--bad);font-size:20px}
    .mail.on{display:inline-block}
    .body{margin-top:8px;height:335px;border:1px solid var(--line);background:var(--panel);display:flex;align-items:center;justify-content:center;flex-direction:column}
    .clock{font-size:112px;line-height:1;color:var(--text);text-shadow:0 0 10px rgba(120,255,140,.2)}
    .date{margin-top:10px;font-size:30px;color:var(--dim)}
    .status{margin-top:16px;font-size:24px;color:var(--dim)}
    .status.bad{color:var(--bad)}
    .footer{margin-top:8px;height:38px;border:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;color:var(--dim);font-size:20px}
    .tab{border:1px solid var(--line);padding:2px 8px}
    .active{color:var(--text);border-color:var(--text)}
    a{color:inherit;text-decoration:none}
  </style>
</head>
<body>
  <div class="safe">
    <div class="screen">
      <div class="top">
        <div id="host">CLOCK</div>
        <div class="right">
          <div id="mail" class="mail">MAIL</div>
          <div id="topClock">--:--:--</div>
        </div>
      </div>

      <div class="body">
        <div id="mainClock" class="clock">--:--</div>
        <div id="mainDate" class="date">------</div>
        <div id="criticalInfo" class="status">No critical alerts</div>
      </div>

      <div class="footer">
        <div class="tab active">F1 CLOCK</div>
        <a class="tab" href="overview.html">F2 PC OVERVIEW</a>
        <a class="tab" href="alerts.html">F3 ALERTS</a>
        <a class="tab" href="processes.html">F4 PROCESSES</a>
      </div>
    </div>
  </div>

  <script>
    const API = "http://192.168.0.54:8765";
    let indicatorInFlight = false;

    function updateTime(){
      const now = new Date();
      document.getElementById("topClock").textContent = now.toLocaleTimeString();
      document.getElementById("mainClock").textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      document.getElementById("mainDate").textContent = now.toLocaleDateString();
    }

    async function updateCriticalIndicator(){
      if (indicatorInFlight) return;
      indicatorInFlight = true;
      const mail = document.getElementById("mail");
      const info = document.getElementById("criticalInfo");
      try{
        const r = await fetch(`${API}/api/alerts/stats`, {cache:"no-store"});
        const j = await r.json();
        const critical = j.stats?.last_hour?.CRITICAL || 0;

        if(critical > 0){
          mail.classList.add("on");
          info.classList.add("bad");
          info.textContent = `Critical alerts (last hour): ${critical}`;
        }else{
          mail.classList.remove("on");
          info.classList.remove("bad");
          info.textContent = "No critical alerts";
        }
      }catch(e){
        mail.classList.remove("on");
        info.classList.add("bad");
        info.textContent = "API OFFLINE";
      }finally{
        indicatorInFlight = false;
      }
    }

    function tick(){
      updateTime();
      updateCriticalIndicator();
    }

    tick();
    setInterval(tick, 2000);
  </script>
</body>
</html>
