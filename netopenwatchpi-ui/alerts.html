<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=640, height=480, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>NetOpenWatchPi - Alerts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#07120a;--panel:#0a1b0f;--line:#173d22;--text:#99ff9f;--dim:#56b35f;--warn:#ffd34d;--bad:#ff5f5f;}
    *{box-sizing:border-box}
    html,body{margin:0;width:640px;height:480px;overflow:hidden;background:var(--bg);color:var(--text);font-family:"VT323","Consolas",monospace}
    .safe{width:100%;height:100%;padding:12px}
    .screen{position:relative;width:100%;height:100%;border:2px solid var(--line);background:radial-gradient(circle at center,#0a1d10 0%,#061009 100%);padding:10px}
    .screen::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px)}
    .top{height:38px;border:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 8px;color:var(--dim);font-size:24px}
    .body{margin-top:8px;height:290px;display:grid;grid-template-columns:220px 1fr;gap:8px}
    .pane{border:1px solid var(--line);background:var(--panel);padding:6px;overflow:hidden}
    .mode-btn{display:block;width:100%;margin-bottom:6px;border:1px solid var(--line);background:transparent;color:var(--dim);font:inherit;font-size:20px;padding:4px;text-align:left}
    .mode-btn.active{color:var(--text);border-color:var(--text)}
    .line{font-size:19px;line-height:1.2;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .info{color:var(--text)} .warn{color:var(--warn)} .critical{color:var(--bad)}
    .line.new-alert{
      position:relative;
      padding-left:10px;
    }
    .line.new-alert::before{
      content:"";
      position:absolute;
      left:0;
      top:2px;
      bottom:2px;
      width:3px;
      pointer-events:none;
      opacity:0;
      animation:alertMarker 1s ease-out forwards;
    }
    .line.info.new-alert::before{
      background:#99ff9f;
    }
    .line.warn.new-alert::before{
      background:#ffd34d;
    }
    .line.critical.new-alert::before{
      background:#ff5f5f;
    }
    @keyframes alertMarker{
      0%{opacity:1;filter:brightness(1.8)}
      35%{opacity:.9;filter:brightness(1.2)}
      100%{opacity:0;filter:none}
    }
    .footer{margin-top:8px;height:38px;border:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;color:var(--dim);font-size:20px}
    .tab{border:1px solid var(--line);padding:2px 8px}
    .active-tab{color:var(--text);border-color:var(--text)}
    a{color:inherit;text-decoration:none}
  </style>
</head>
<body>
  <div class="safe">
    <div class="screen">
      <div class="top">
        <div id="title">ALERTS | STATS</div>
        <div id="clock">--:--:--</div>
      </div>

      <div class="body">
        <div class="pane">
          <button type="button" class="mode-btn active" data-mode="stats">STATS</button>
          <button type="button" class="mode-btn" data-mode="live">LIVE</button>
          <button type="button" class="mode-btn" data-mode="check">CHECK</button>
          <button type="button" class="mode-btn" data-mode="risks">RISKS</button>
          <button type="button" class="mode-btn" data-mode="logs">LOGS</button>
        </div>
        <div class="pane" id="content"></div>
      </div>

      <div class="footer">
        <a class="tab" href="index.html">F1 CLOCK</a>
        <a class="tab" href="overview.html">F2 PC OVERVIEW</a>
        <div class="tab active-tab">F3 ALERTS</div>
        <a class="tab" href="processes.html">F4 PROCESSES</a>
      </div>
    </div>
  </div>
<script>
  const API = "http://192.168.0.54:8765";
  const POLL_MS = 2000;
  const MAX_ROWS = 12;
  const MODE_STORAGE_KEY = "netopenwatchpi_alerts_mode";
  const VALID_MODES = new Set(["stats", "live", "check", "risks", "logs"]);

  let mode = "stats";
  let timer = null;
  let lastLiveKeys = new Set();
  let liveRevision = 0;
  let tickInFlight = false;
  let modeEpoch = 0;

  function cls(sev) {
    const s = (sev || "INFO").toUpperCase();
    if (s === "CRITICAL") return "critical";
    if (s === "WARN") return "warn";
    return "info";
  }

  function resolveInitialMode() {
    const hashMode = window.location.hash.replace("#", "").toLowerCase();
    if (VALID_MODES.has(hashMode)) {
      return hashMode;
    }

    const storedMode = (localStorage.getItem(MODE_STORAGE_KEY) || "").toLowerCase();
    if (VALID_MODES.has(storedMode)) {
      return storedMode;
    }

    return "stats";
  }

  function getModePollInterval(selectedMode) {
    if (selectedMode === "check") {
      return 0;
    }
    return POLL_MS;
  }

  function setMode(next, syncHash = true) {
    if (!VALID_MODES.has(next)) {
      next = "stats";
    }

    mode = next;
    modeEpoch += 1;
    if (mode !== "live") {
      lastLiveKeys = new Set();
      liveRevision = 0;
    }
    localStorage.setItem(MODE_STORAGE_KEY, next);
    if (syncHash && window.location.hash !== `#${next}`) {
      window.location.hash = next;
    }

    document.getElementById("title").textContent = `ALERTS | ${next.toUpperCase()}`;
    document.querySelectorAll(".mode-btn").forEach((b) => {
      b.classList.toggle("active", b.dataset.mode === next);
    });

    if (timer) clearInterval(timer);
    tick();
    const interval = getModePollInterval(next);
    if (interval > 0) {
      timer = setInterval(tick, interval);
    } else {
      timer = null;
    }
  }

  function renderLines(lines) {
    const c = document.getElementById("content");
    if (!lines.length) {
      c.innerHTML = `<div class="line info">No data.</div>`;
      return;
    }
    c.innerHTML = lines.join("");
  }

  function liveKeyOf(item) {
    return item.event_key || `${item.type || ""}|${item.process || ""}|${item.pid || ""}|${item.remote_ip || ""}|${item.remote_port || ""}|${item.ts || ""}`;
  }

  function liveRowHtml(a, isNew = false) {
    const t = a.ts ? new Date(a.ts * 1000).toLocaleTimeString() : "--:--:--";
    const ip = a.remote_ip ? ` ip=${a.remote_ip}` : "";
    const port = a.remote_port ? ` port=${a.remote_port}` : "";
    const extraClass = isNew ? " new-alert" : "";
    return `<div class="line ${cls(a.severity)}${extraClass}" data-live-key="${liveKeyOf(a)}">[${a.severity || "INFO"}] [${t}] ${a.type || "event"} -> ${a.process || "N/A"}${ip}${port}</div>`;
  }

  function renderLiveInitial(items) {
    const content = document.getElementById("content");

    if (!items.length) {
      lastLiveKeys = new Set();
      content.innerHTML = `<div class="line info">No data.</div>`;
      return;
    }

    content.innerHTML = items.map((item) => liveRowHtml(item, false)).join("");
    lastLiveKeys = new Set(items.map(liveKeyOf));
  }

  function appendNewLiveItems(items) {
    const content = document.getElementById("content");
    const placeholder = content.querySelector(".line.info");
    if (placeholder && placeholder.textContent === "No data.") {
      content.innerHTML = "";
    }

    for (let i = items.length - 1; i >= 0; i--) {
      const item = items[i];
      const key = liveKeyOf(item);
      if (lastLiveKeys.has(key)) {
        continue;
      }

      content.insertAdjacentHTML("afterbegin", liveRowHtml(item, true));
      lastLiveKeys.add(key);
    }

    while (content.querySelectorAll("[data-live-key]").length > MAX_ROWS) {
      const rows = content.querySelectorAll("[data-live-key]");
      const lastRow = rows[rows.length - 1];
      if (lastRow) {
        lastLiveKeys.delete(lastRow.dataset.liveKey);
        lastRow.remove();
      } else {
        break;
      }
    }

    if (!content.querySelector("[data-live-key]")) {
      content.innerHTML = `<div class="line info">No data.</div>`;
    }
  }

  async function fetchStats(epoch) {
    const r = await fetch(`${API}/api/alerts/stats`, { cache: "no-store" });
    const j = await r.json();
    if (epoch !== modeEpoch || mode !== "stats") return;
    const h = j.stats?.last_hour || {};
    const d = j.stats?.last_day || {};

    renderLines([
      `<div class="line info">Last hour</div>`,
      `<div class="line info">INFO=${h.INFO || 0} WARN=${h.WARN || 0} CRITICAL=${h.CRITICAL || 0}</div>`,
      `<div class="line info">---</div>`,
      `<div class="line info">Last day</div>`,
      `<div class="line info">INFO=${d.INFO || 0} WARN=${d.WARN || 0} CRITICAL=${d.CRITICAL || 0}</div>`
    ]);
  }

  async function fetchLive(epoch) {
    const url = liveRevision > 0
      ? `${API}/api/alerts/live?since_rev=${liveRevision}`
      : `${API}/api/alerts/live`;
    const r = await fetch(url, { cache: "no-store" });
    const j = await r.json();
    if (epoch !== modeEpoch || mode !== "live") return;

    const items = j.items || [];
    const revision = Number(j.revision || 0);

    if (liveRevision === 0) {
      renderLiveInitial(items.slice(0, MAX_ROWS));
    } else if (items.length) {
      appendNewLiveItems(items);
    }

    if (revision > liveRevision) {
      liveRevision = revision;
    }
  }

  async function fetchCheck(epoch) {
    const r = await fetch(`${API}/api/alerts/check`, { cache: "no-store" });
    const j = await r.json();
    if (epoch !== modeEpoch || mode !== "check") return;
    const items = (j.items || [])
      .sort((a, b) => (b.ts || 0) - (a.ts || 0))
      .slice(0, MAX_ROWS);

    renderLines(
      items.map((a) => {
        const t = a.ts ? new Date(a.ts * 1000).toLocaleTimeString() : "--:--:--";
        const ip = a.remote_ip ? ` ip=${a.remote_ip}` : "";
        const port = a.remote_port ? ` port=${a.remote_port}` : "";
        return `<div class="line ${cls(a.severity)}">[${a.severity || "INFO"}] [${t}] ${a.type || "event"} -> ${a.process || "N/A"}${ip}${port}</div>`;
      })
    );
  }

  async function fetchRisks(epoch) {
    const r = await fetch(`${API}/api/alerts/risks`, { cache: "no-store" });
    const j = await r.json();
    if (epoch !== modeEpoch || mode !== "risks") return;
    const items = (j.items || []).slice(0, MAX_ROWS);

    renderLines(
      items.map((a) => {
        return `<div class="line ${cls(a.severity)}">[${a.severity || "INFO"}] ${a.process || "N/A"} | conn=${a.connections || 0} | risk=${a.risk_count || 0} | ips=${a.risky_ips_count || 0} | ${a.top_reason || ""}</div>`;
      })
    );
  }

  async function fetchLogs(epoch) {
    const r = await fetch(`${API}/api/alerts/logs?limit=${MAX_ROWS}`, { cache: "no-store" });
    const j = await r.json();
    if (epoch !== modeEpoch || mode !== "logs") return;
    const items = (j.items || []).sort((a, b) => (b.ts || 0) - (a.ts || 0));

    renderLines(
      items.map((a) => {
        const t = a.ts ? new Date(a.ts * 1000).toLocaleTimeString() : "--:--:--";
        return `<div class="line ${cls(a.severity)}">[${a.severity || "INFO"}] [${t}] ${a.type || "event"} -> ${a.process || "N/A"}</div>`;
      })
    );
  }

  async function tick() {
    if (tickInFlight) {
      return;
    }
    tickInFlight = true;
    const epoch = modeEpoch;
    document.getElementById("clock").textContent = new Date().toLocaleTimeString();
    try {
      if (mode === "stats") return await fetchStats(epoch);
      if (mode === "live") return await fetchLive(epoch);
      if (mode === "check") return await fetchCheck(epoch);
      if (mode === "risks") return await fetchRisks(epoch);
      if (mode === "logs") return await fetchLogs(epoch);
    } catch (e) {
      if (epoch === modeEpoch) {
        document.getElementById("content").innerHTML = `<div class="line critical">HOST OFFLINE</div>`;
      }
    } finally {
      tickInFlight = false;
    }
  }

  document.querySelectorAll(".mode-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.preventDefault();
      setMode(btn.dataset.mode);
    });
  });

  window.addEventListener("hashchange", () => {
    const hashMode = window.location.hash.replace("#", "").toLowerCase();
    if (VALID_MODES.has(hashMode) && hashMode !== mode) {
      setMode(hashMode, false);
    }
  });

  setMode(resolveInitialMode(), false);
</script>

</body>
</html>
