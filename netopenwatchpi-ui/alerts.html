<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=640, height=480, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>NetOpenWatchPi - Alerts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#07120a;--panel:#0a1b0f;--line:#173d22;--text:#99ff9f;--dim:#56b35f;--warn:#ffd34d;--bad:#ff5f5f;}
    *{box-sizing:border-box}
    html,body{margin:0;width:640px;height:480px;overflow:hidden;background:var(--bg);color:var(--text);font-family:"VT323","Consolas",monospace}
    .safe{width:100%;height:100%;padding:12px}
    .screen{position:relative;width:100%;height:100%;border:2px solid var(--line);background:radial-gradient(circle at center,#0a1d10 0%,#061009 100%);padding:10px}
    .screen::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px)}
    .top{height:38px;border:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 8px;color:var(--dim);font-size:24px}
    .body{margin-top:8px;height:331px;display:grid;grid-template-columns:220px 1fr;gap:8px}
    .pane{border:1px solid var(--line);background:var(--panel);padding:6px;overflow:hidden}
    .mode-btn{display:block;width:100%;margin-bottom:6px;border:1px solid var(--line);background:transparent;color:var(--dim);font:inherit;font-size:24px;padding:3px 4px;text-align:left}
    .mode-btn.active{color:var(--text);border-color:var(--text)}
    .mode-btn.focused{box-shadow:inset 0 0 0 1px var(--text)}
    .line{font-size:22px;line-height:1.15;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .info{color:var(--text)} .warn{color:var(--warn)} .critical{color:var(--bad)}
    .action-btn{display:block;width:100%;margin-bottom:8px;border:1px solid var(--text);background:transparent;color:var(--text);font:inherit;font-size:24px;padding:4px 6px;text-align:center}
    .section{margin:4px 0 6px;color:var(--dim);font-size:22px}
    .selected{background:rgba(153,255,159,.10);border-left:2px solid var(--text)}
    .line.new-alert{
      position:relative;
      padding-left:10px;
    }
    .line.new-alert::before{
      content:"";
      position:absolute;
      left:0;
      top:2px;
      bottom:2px;
      width:3px;
      pointer-events:none;
      opacity:0;
      animation:alertMarker 1s ease-out forwards;
    }
    .line.info.new-alert::before{
      background:#99ff9f;
    }
    .line.warn.new-alert::before{
      background:#ffd34d;
    }
    .line.critical.new-alert::before{
      background:#ff5f5f;
    }
    @keyframes alertMarker{
      0%{opacity:1;filter:brightness(1.8)}
      35%{opacity:.9;filter:brightness(1.2)}
      100%{opacity:0;filter:none}
    }
    .footer{margin-top:8px;height:42px;border:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;color:var(--dim);font-size:24px}
    .tab{border:1px solid var(--line);padding:1px 8px}
    .active-tab{color:var(--text);border-color:var(--text)}
    a{color:inherit;text-decoration:none}
  </style>
</head>
<body>
  <div class="safe">
    <div class="screen">
      <div class="top">
        <div id="title">ALERTS | STATS</div>
        <div id="clock">--:--:--</div>
      </div>

      <div class="body">
        <div class="pane">
          <button type="button" class="mode-btn active" data-mode="stats">STATS</button>
          <button type="button" class="mode-btn" data-mode="live">LIVE</button>
          <button type="button" class="mode-btn" data-mode="snapshot">SNAPSHOT</button>
          <button type="button" class="mode-btn" data-mode="risks">RISKS</button>
          <button type="button" class="mode-btn" data-mode="logs">LOGS</button>
        </div>
        <div class="pane" id="content"></div>
      </div>

      <div class="footer">
        <a class="tab" href="index.html">F1 CLOCK</a>
        <a class="tab" href="overview.html">F2 PC OVERVIEW</a>
        <div class="tab active-tab">F3 ALERTS</div>
        <a class="tab" href="processes.html">F4 PROCESSES</a>
      </div>
    </div>
  </div>
<script src="nav.js"></script>
<script>
  const API = "http://192.168.0.54:8765";
  const POLL_MS = 2000;
  const MAX_ROWS = 12;
  const MODE_STORAGE_KEY = "netopenwatchpi_alerts_mode";
  const MODE_ORDER = ["stats", "live", "snapshot", "risks", "logs"];
  const VALID_MODES = new Set(MODE_ORDER);

  let mode = "stats";
  let timer = null;
  let lastLiveKeys = new Set();
  let liveRevision = 0;
  let tickInFlight = false;
  let modeEpoch = 0;
  let snapshotBusy = false;
  let logsOffset = 0;
  let logsTotal = 0;
  let logsFreezeTs = null;
  let selectedModeIndex = 0;
  let logsItems = [];
  let logsView = "list";
  let logsDetailItem = null;
  let logsFetchSeq = 0;
  let logsNeedsRefresh = false;
  let latestStats = null;

  function cls(sev) {
    const s = (sev || "INFO").toUpperCase();
    if (s === "CRITICAL") return "critical";
    if (s === "WARN") return "warn";
    return "info";
  }

  function resolveInitialMode() {
    const hashMode = window.location.hash.replace("#", "").toLowerCase();
    if (VALID_MODES.has(hashMode)) {
      return hashMode;
    }

    const storedMode = (localStorage.getItem(MODE_STORAGE_KEY) || "").toLowerCase();
    if (VALID_MODES.has(storedMode)) {
      return storedMode;
    }

    return "stats";
  }

  function getModePollInterval(selectedMode) {
    if (selectedMode === "snapshot" || selectedMode === "logs") {
      return 0;
    }
    return POLL_MS;
  }

  function setMode(next, syncHash = true) {
    if (!VALID_MODES.has(next)) {
      next = "stats";
    }

    mode = next;
    modeEpoch += 1;
    if (mode !== "live") {
      lastLiveKeys = new Set();
      liveRevision = 0;
    }
    if (mode !== "logs") {
      logsOffset = 0;
      logsTotal = 0;
      logsFreezeTs = null;
      logsItems = [];
      logsView = "list";
      logsDetailItem = null;
      logsFetchSeq = 0;
      logsNeedsRefresh = false;
    }
    localStorage.setItem(MODE_STORAGE_KEY, next);
    if (syncHash && window.location.hash !== `#${next}`) {
      window.location.hash = next;
    }

    document.getElementById("title").textContent = `ALERTS | ${next.toUpperCase()}`;
    document.querySelectorAll(".mode-btn").forEach((b) => {
      b.classList.toggle("active", b.dataset.mode === next);
    });
    syncSelectedMode(next);

    if (timer) clearInterval(timer);
    tick();
    const interval = getModePollInterval(next);
    if (interval > 0) {
      timer = setInterval(tick, interval);
    } else {
      timer = null;
    }
  }

  function renderLines(lines) {
    const c = document.getElementById("content");
    if (!lines.length) {
      c.innerHTML = `<div class="line info">No data.</div>`;
      return;
    }
    c.innerHTML = lines.join("");
  }

  function syncSelectedMode(next) {
    const idx = MODE_ORDER.indexOf(next);
    if (idx >= 0) {
      selectedModeIndex = idx;
    }
    document.querySelectorAll(".mode-btn").forEach((b, i) => {
      b.classList.toggle("focused", i === selectedModeIndex);
    });
  }

  function liveKeyOf(item) {
    return item.event_key || `${item.type || ""}|${item.process || ""}|${item.pid || ""}|${item.remote_ip || ""}|${item.remote_port || ""}|${item.ts || ""}`;
  }

  function liveRowHtml(a, isNew = false) {
    const t = a.ts ? new Date(a.ts * 1000).toLocaleTimeString() : "--:--:--";
    const ip = a.remote_ip ? ` ip=${a.remote_ip}` : "";
    const port = a.remote_port ? ` port=${a.remote_port}` : "";
    const extraClass = isNew ? " new-alert" : "";
    return `<div class="line ${cls(a.severity)}${extraClass}" data-live-key="${liveKeyOf(a)}">[${a.severity || "INFO"}] [${t}] ${a.type || "event"} -> ${a.process || "N/A"}${ip}${port}</div>`;
  }

  function renderLiveInitial(items) {
    const content = document.getElementById("content");

    if (!items.length) {
      lastLiveKeys = new Set();
      content.innerHTML = `<div class="line info">No data.</div>`;
      return;
    }

    content.innerHTML = items.map((item) => liveRowHtml(item, false)).join("");
    lastLiveKeys = new Set(items.map(liveKeyOf));
  }

  function appendNewLiveItems(items) {
    const content = document.getElementById("content");
    const placeholder = content.querySelector(".line.info");
    if (placeholder && placeholder.textContent === "No data.") {
      content.innerHTML = "";
    }

    for (let i = items.length - 1; i >= 0; i--) {
      const item = items[i];
      const key = liveKeyOf(item);
      if (lastLiveKeys.has(key)) {
        continue;
      }

      content.insertAdjacentHTML("afterbegin", liveRowHtml(item, true));
      lastLiveKeys.add(key);
    }

    while (content.querySelectorAll("[data-live-key]").length > MAX_ROWS) {
      const rows = content.querySelectorAll("[data-live-key]");
      const lastRow = rows[rows.length - 1];
      if (lastRow) {
        lastLiveKeys.delete(lastRow.dataset.liveKey);
        lastRow.remove();
      } else {
        break;
      }
    }

    if (!content.querySelector("[data-live-key]")) {
      content.innerHTML = `<div class="line info">No data.</div>`;
    }
  }

  async function fetchStats(epoch) {
    const r = await fetch(`${API}/api/alerts/stats`, { cache: "no-store" });
    const j = await r.json();
    if (epoch !== modeEpoch || mode !== "stats") return;
    const s = j.stats || {};
    latestStats = s;
    const h = s.last_hour || {};
    const d = s.last_day || {};

    const fmtTs = (ts) => ts ? new Date(ts * 1000).toLocaleTimeString() : "--:--:--";
    const lastAlert = s.last_alert;
    const lastCritical = s.last_critical;

    renderLines([
      ...(s.unacknowledged_critical_total > 0
        ? [`<button type="button" class="action-btn" data-action="ack-critical">ACKNOWLEDGE CRITICAL</button>`]
        : []),
      `<div class="line info">[WINDOWS]</div>`,
      `<div class="line info">1H  I:${h.INFO || 0}  W:${h.WARN || 0}  C:${h.CRITICAL || 0}</div>`,
      `<div class="line info">24H I:${d.INFO || 0}  W:${d.WARN || 0}  C:${d.CRITICAL || 0}</div>`,
      `<div class="line info">[NOW]</div>`,
      `<div class="line info">ACTIVE ${s.active_total ?? 0} | LIVE ${s.live_feed_total ?? 0}</div>`,
      `<div class="line critical">CRIT ACTIVE ${s.active_critical_total ?? 0} | UNACK ${s.unacknowledged_critical_total ?? 0}</div>`,
      `<div class="line info">PROC ${s.processes_with_network ?? 0} | CONN ${s.connections_total ?? 0}</div>`,
      `<div class="line warn">RISKS  C:${s.risk_critical ?? 0}  W:${s.risk_warn ?? 0}  TOTAL:${s.risk_total ?? 0}</div>`,
      `<div class="line info">[RECENT]</div>`,
      `<div class="line ${cls(lastAlert?.severity)}">LAST  ${lastAlert?.severity || "NONE"}  ${fmtTs(lastAlert?.ts)}  ${lastAlert?.process || "-"}</div>`,
      `<div class="line critical">CRIT  ${fmtTs(lastCritical?.ts)}  ${lastCritical?.process || "NONE"}</div>`
    ]);
  }

  async function acknowledgeCriticals() {
    const r = await fetch(`${API}/api/alerts/acknowledge-critical`, { cache: "no-store" });
    const j = await r.json();
    latestStats = j.stats || null;
    if (mode === "stats") {
      await fetchStats(modeEpoch);
    }
  }

  async function fetchLive(epoch) {
    const url = liveRevision > 0
      ? `${API}/api/alerts/live?since_rev=${liveRevision}`
      : `${API}/api/alerts/live`;
    const r = await fetch(url, { cache: "no-store" });
    const j = await r.json();
    if (epoch !== modeEpoch || mode !== "live") return;

    const items = j.items || [];
    const revision = Number(j.revision || 0);

    if (liveRevision === 0) {
      renderLiveInitial(items.slice(0, MAX_ROWS));
    } else if (items.length) {
      appendNewLiveItems(items);
    }

    if (revision > liveRevision) {
      liveRevision = revision;
    }
  }

  function snapshotLine(item) {
    return `<div class="line info">${item.label || "--"} | PROC ${item.processes_with_network || 0} | CONN ${item.connections_total || 0} | RISK ${item.risk_total || 0}</div>`;
  }

  async function fetchSnapshot(epoch) {
    const r = await fetch(`${API}/api/snapshots/list?limit=8`, { cache: "no-store" });
    const j = await r.json();
    if (epoch !== modeEpoch || mode !== "snapshot") return;
    const items = j.items || [];
    const content = document.getElementById("content");
    const status = snapshotBusy
      ? `<div class="line warn">Creating snapshot...</div>`
      : `<div class="line info">Create network snapshot here. Analyze later on PC in snapshot.html.</div>`;

    content.innerHTML = [
      `<button type="button" class="action-btn" data-action="make-snapshot">MAKE SNAPSHOT</button>`,
      status,
      `<div class="section">RECENT SNAPSHOTS</div>`,
      ...(items.length ? items.map(snapshotLine) : [`<div class="line info">No snapshots yet.</div>`]),
    ].join("");
  }

  async function makeSnapshot() {
    if (snapshotBusy) return;
    snapshotBusy = true;
    if (mode === "snapshot") {
      await fetchSnapshot(modeEpoch);
    }

    try {
      const r = await fetch(`${API}/api/snapshots/create`, { cache: "no-store" });
      await r.json();
    } catch (e) {
      if (mode === "snapshot") {
        document.getElementById("content").innerHTML = [
          `<button type="button" class="action-btn" data-action="make-snapshot">MAKE SNAPSHOT</button>`,
          `<div class="line critical">Failed to create snapshot.</div>`,
        ].join("");
      }
      return;
    } finally {
      snapshotBusy = false;
    }

    if (mode === "snapshot") {
      await fetchSnapshot(modeEpoch);
    }
  }

  async function fetchRisks(epoch) {
    const r = await fetch(`${API}/api/alerts/risks`, { cache: "no-store" });
    const j = await r.json();
    if (epoch !== modeEpoch || mode !== "risks") return;
    const items = (j.items || []).slice(0, MAX_ROWS);

    renderLines(
      items.map((a) => {
        return `<div class="line ${cls(a.severity)}">[${a.severity || "INFO"}] ${a.process || "N/A"} | conn=${a.connections || 0} | risk=${a.risk_count || 0} | ips=${a.risky_ips_count || 0} | ${a.top_reason || ""}</div>`;
      })
    );
  }

  async function fetchLogs(epoch) {
    if (logsView === "detail") return;
    const requestedOffset = logsOffset;
    const requestedFreezeTs = logsFreezeTs;
    const reqSeq = ++logsFetchSeq;
    const params = new URLSearchParams({
      limit: String(MAX_ROWS),
      offset: String(requestedOffset),
    });
    if (requestedFreezeTs != null) {
      params.set("until_ts", String(requestedFreezeTs));
    }
    const r = await fetch(`${API}/api/alerts/logs?${params.toString()}`, { cache: "no-store" });
    const j = await r.json();
    if (reqSeq !== logsFetchSeq || epoch !== modeEpoch || mode !== "logs" || logsView === "detail") return;
    const itemsRaw = (j.items || []).sort((a, b) => (b.ts || 0) - (a.ts || 0));
    if (requestedFreezeTs == null && itemsRaw.length) {
      logsFreezeTs = itemsRaw[0].ts || null;
      return await fetchLogs(epoch);
    }
    if (requestedOffset !== logsOffset) return;
    if ((requestedFreezeTs ?? null) !== (logsFreezeTs ?? null)) return;
    logsTotal = Number(j.total || 0);
    logsItems = itemsRaw;
    const items = logsItems;
    const rangeStart = logsTotal ? logsOffset + 1 : 0;
    const rangeEnd = logsTotal ? Math.min(logsOffset + items.length, logsTotal) : 0;

    renderLines([
      `<div class="section">LOGS ${rangeStart}-${rangeEnd} / ${logsTotal || 0}</div>`,
      `<div class="line info">UP newer | DOWN older | wheel scroll</div>`,
      ...items.map((a, idx) => {
        const t = a.ts ? new Date(a.ts * 1000).toLocaleTimeString() : "--:--:--";
        const isSelected = idx === 0 ? " selected" : "";
        return `<div class="line ${cls(a.severity)}${isSelected}">[${a.severity || "INFO"}] [${t}] ${a.type || "event"} -> ${a.process || "N/A"}</div>`;
      }),
    ]);
  }

  function renderLogDetail() {
    const a = logsDetailItem;
    if (!a) {
      logsView = "list";
      tick();
      return;
    }

    const t = a.ts ? new Date(a.ts * 1000).toLocaleString() : "--";
    renderLines([
      `<div class="section">LOG ENTRY DETAIL</div>`,
      `<div class="line ${cls(a.severity)}">${a.severity || "INFO"} | ${a.type || "event"}</div>`,
      `<div class="line info">time ${t}</div>`,
      `<div class="line info">process ${a.process || "-"}</div>`,
      `<div class="line info">pid ${a.pid ?? "-"}</div>`,
      `<div class="line info">ip ${a.remote_ip || "-"}</div>`,
      `<div class="line info">port ${a.remote_port ?? "-"}</div>`,
      `<div class="line info">reason ${a.reason || "-"}</div>`,
      `<div class="line info">event_key ${a.event_key || "-"}</div>`,
      `<div class="line warn">BACK to list</div>`,
    ]);
  }

  function scrollLogs(delta) {
    if (mode !== "logs") return;
    if (logsTotal <= 0) return;
    const next = Math.max(0, logsOffset + delta);
    const maxOffset = Math.max(0, logsTotal - MAX_ROWS);
    const targetOffset = Math.min(next, maxOffset);
    if (targetOffset === logsOffset) return;
    logsOffset = targetOffset;
    logsFetchSeq += 1;
    if (tickInFlight) {
      logsNeedsRefresh = true;
      return;
    }
    tick();
  }

  function moveModeSelection(delta) {
    selectedModeIndex = (selectedModeIndex + delta + MODE_ORDER.length) % MODE_ORDER.length;
    syncSelectedMode(MODE_ORDER[selectedModeIndex]);
  }

  async function tick() {
    if (tickInFlight) {
      return;
    }
    tickInFlight = true;
    const epoch = modeEpoch;
    document.getElementById("clock").textContent = new Date().toLocaleTimeString();
    try {
      if (mode === "stats") return await fetchStats(epoch);
      if (mode === "live") return await fetchLive(epoch);
      if (mode === "snapshot") return await fetchSnapshot(epoch);
      if (mode === "risks") return await fetchRisks(epoch);
      if (mode === "logs") return await fetchLogs(epoch);
    } catch (e) {
      if (epoch === modeEpoch) {
        document.getElementById("content").innerHTML = `<div class="line critical">HOST OFFLINE</div>`;
      }
    } finally {
      tickInFlight = false;
      if (mode === "logs" && logsNeedsRefresh && logsView !== "detail") {
        logsNeedsRefresh = false;
        setTimeout(() => tick(), 0);
      }
    }
  }

  document.querySelectorAll(".mode-btn").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.preventDefault();
      setMode(btn.dataset.mode);
    });
  });

  document.getElementById("content").addEventListener("click", (e) => {
    const actionEl = e.target.closest("[data-action]");
    if (!actionEl) return;
    if (actionEl.dataset.action === "make-snapshot") {
      e.preventDefault();
      makeSnapshot();
    }
    if (actionEl.dataset.action === "ack-critical") {
      e.preventDefault();
      acknowledgeCriticals();
    }
  });

  document.getElementById("content").addEventListener("wheel", (e) => {
    if (mode !== "logs") return;
    e.preventDefault();
    scrollLogs(e.deltaY > 0 ? 1 : -1);
  }, { passive: false });

  window.deviceNav = {
    onUp() {
      if (mode === "logs") {
        if (logsView === "detail") return true;
        scrollLogs(-1);
        return true;
      }
      moveModeSelection(-1);
      return true;
    },
    onDown() {
      if (mode === "logs") {
        if (logsView === "detail") return true;
        scrollLogs(1);
        return true;
      }
      moveModeSelection(1);
      return true;
    },
    onSelect() {
      if (mode === "stats" && selectedModeIndex === 0 && Number(latestStats?.unacknowledged_critical_total || 0) > 0) {
        acknowledgeCriticals();
        return true;
      }
      if (mode === "logs") {
        if (logsView === "detail") return true;
        logsDetailItem = logsItems[0] || null;
        logsView = "detail";
        renderLogDetail();
        return true;
      }
      const selected = MODE_ORDER[selectedModeIndex];
      if (selected === "snapshot" && mode === "snapshot") {
        makeSnapshot();
        return true;
      }
      setMode(selected);
      return true;
    },
    onBack() {
      if (mode === "logs" && logsView === "detail") {
        logsView = "list";
        logsDetailItem = null;
        tick();
        return true;
      }
      if (mode !== "stats") {
        setMode("stats");
      } else {
        window.location.href = "index.html";
      }
      return true;
    },
  };

  window.addEventListener("hashchange", () => {
    const hashMode = window.location.hash.replace("#", "").toLowerCase();
    if (VALID_MODES.has(hashMode) && hashMode !== mode) {
      setMode(hashMode, false);
    }
  });

  setMode(resolveInitialMode(), false);
</script>

</body>
</html>
