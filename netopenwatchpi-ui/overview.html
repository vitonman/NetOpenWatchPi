<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=640, height=480, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>NetOpenWatchPi - PC Overview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07120a;
      --panel:#0a1b0f;
      --line:#173d22;
      --text:#99ff9f;
      --dim:#56b35f;
      --warn:#ffd34d;
      --bad:#ff5f5f;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:640px;
      height:480px;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:"VT323","Consolas","Courier New",monospace;
      letter-spacing:.3px;
    }

    .safe{ width:100%; height:100%; padding:12px; }

    .screen{
      position:relative;
      width:100%;
      height:100%;
      border:2px solid var(--line);
      box-shadow: inset 0 0 40px rgba(80,255,120,.08);
      background: radial-gradient(circle at center, #0a1d10 0%, #061009 100%);
      padding:10px;
    }

    .screen::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,.18) 3px
      );
      mix-blend-mode:multiply;
    }

    .top{
      height:38px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border:1px solid var(--line);
      padding:0 8px;
      color:var(--dim);
      font-size:24px;
    }

    .layout{
      margin-top:8px;
      height:335px;
      display:grid;
      grid-template-columns: 250px 1fr;
      gap:8px;
    }

    .left,
    .right{
      display:grid;
      gap:8px;
      min-height:0;
    }

    .left{ grid-template-rows: 1fr 1fr; }
    .right{ grid-template-rows: 112px 104px 1fr; }

    .card{
      border:1px solid var(--line);
      background:var(--panel);
      padding:8px;
      overflow:hidden;
      min-height:0;
      position:relative;
    }

    .card::before{
      content:"";
      position:absolute;
      left:8px;
      right:8px;
      top:0;
      height:1px;
      background:linear-gradient(
        to right,
        rgba(153,255,159,.18),
        rgba(153,255,159,.04)
      );
    }

    .label{
      color:var(--dim);
      font-size:26px;
      letter-spacing:.3px;
    }
    .value{
      margin-top:4px;
      font-size:40px;
      line-height:1;
      color:var(--text);
      text-shadow:0 0 6px rgba(120,255,140,.18);
    }
    .meta{ margin-top:4px; font-size:30px; color:var(--dim); line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .line{
      margin-top:6px;
      padding-top:4px;
      font-size:22px;
      color:#6ec275;
      line-height:1.12;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      border-top:1px solid rgba(86,179,95,.18);
    }
    .hero-pair{
      margin-top:6px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      align-items:end;
    }
    .hero .value{ margin-top:0; }

    .ok{ color:var(--text); }
    .warn{ color:var(--warn); }
    .bad{ color:var(--bad); }

    .dual{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      height:100%;
    }

    .footer{
      margin-top:8px;
      height:42px;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-around;
      color:var(--dim);
      font-size:24px;
    }

    .tab{ border:1px solid var(--line); padding:1px 8px; }
    .active{ color:var(--text); border-color:var(--text); }
    a{ color:inherit; text-decoration:none; }
  </style>
</head>
<body>
  <div class="safe">
    <div class="screen">
      <div class="top">
        <div id="host">HOST</div>
        <div id="clock">--:--:--</div>
      </div>

      <div class="layout">
        <div class="left">
          <div class="card">
            <div id="cpu_name" class="label">CPU</div>
            <div class="hero-pair">
              <div class="hero">
                <div id="cpu" class="value">--</div>
              </div>
              <div class="hero">
                <div id="cpu_temp" class="value">--</div>
              </div>
            </div>
            <div id="cpu_meta" class="line">FREQ --</div>
          </div>

          <div class="card">
            <div class="label">MEMORY</div>
            <div id="ram" class="value">--</div>
            <div id="ram_meta" class="line">-- / -- MB</div>
          </div>
        </div>

        <div class="right">
          <div class="card">
            <div id="gpu_name" class="label">GPU</div>
            <div class="hero-pair">
              <div class="hero">
                <div id="gpu_usage" class="value">--</div>
              </div>
              <div class="hero">
                <div id="gpu_temp" class="value">--</div>
              </div>
            </div>
            <div id="gpu_meta" class="line">VRAM --</div>
          </div>

          <div class="card">
            
            <div class="dual">
              <div>
                <div class="label">RECV</div>
                <div id="net_rx" class="value">--</div>
              </div>
              <div>
                <div class="label">SENT</div>
                <div id="net_tx" class="value">--</div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="label">STORAGE</div>
            <div id="disk0" class="line">--</div>
            <div id="disk1" class="line">--</div>
          </div>
        </div>
      </div>

      <div class="footer">
        <a class="tab" href="index.html">F1 CLOCK</a>
        <div class="tab active">F2 PC OVERVIEW</div>
        <a class="tab" href="alerts.html">F3 ALERTS</a>
        <a class="tab" href="processes.html">F4 PROCESSES</a>
      </div>
    </div>
  </div>

  <script src="nav.js"></script>
  <script>
    const API = "http://192.168.0.54:8765";
    window.deviceNav = {
      onBack() { window.location.href = "index.html"; return true; },
      onUp() { return true; },
      onDown() { return true; },
      onSelect() { return true; },
    };

    function sevClass(p){
      if (p == null) return "ok";
      if (p >= 85) return "bad";
      if (p >= 65) return "warn";
      return "ok";
    }

    function mb(n){
      if (n == null) return "--";
      return `${Math.round(n/1024/1024)} MB`;
    }

    async function tick(){
      document.getElementById("clock").textContent = new Date().toLocaleTimeString();
      try{
        const r = await fetch(`${API}/api/status`, { cache:"no-store" });
        const j = await r.json();

        document.getElementById("host").textContent = `${j.system?.hostname || "HOST"} | ${j.system?.os || ""}`;

        const cpu = j.metrics?.cpu_percent;
        const ram = j.metrics?.ram_percent;
        const gpuUse = j.gpu?.usage_percent;

        const cpuEl = document.getElementById("cpu");
        const ramEl = document.getElementById("ram");
        const gpuEl = document.getElementById("gpu_usage");

        cpuEl.className = `value ${sevClass(cpu)}`;
        ramEl.className = `value ${sevClass(ram)}`;
        gpuEl.className = `value ${sevClass(gpuUse)}`;

        cpuEl.textContent = cpu == null ? "--" : `${cpu.toFixed(1)}%`;
        ramEl.textContent = ram == null ? "--" : `${ram.toFixed(1)}%`;
        gpuEl.textContent = gpuUse == null ? "N/A" : `${gpuUse.toFixed(0)}%`;

        document.getElementById("cpu_name").textContent = j.metrics?.cpu_name || "Unknown CPU";
        document.getElementById("cpu_temp").textContent = j.metrics?.cpu_temp_c == null ? "--" : `${j.metrics.cpu_temp_c}C`;
        document.getElementById("cpu_meta").textContent = `FREQ ${j.metrics?.cpu_mhz ?? "--"} MHz`;

        document.getElementById("ram_meta").textContent = `${j.metrics?.ram_used_mb ?? "--"} / ${j.metrics?.ram_total_mb ?? "--"} MB`;

        document.getElementById("gpu_name").textContent = j.gpu?.name || "N/A";
        document.getElementById("gpu_temp").textContent = j.metrics?.gpu_temp_c == null ? "--" : `${j.metrics.gpu_temp_c}C`;
        document.getElementById("gpu_meta").textContent =
          `VRAM ${j.gpu?.memory_used_mb ?? "--"} / ${j.gpu?.memory_total_mb ?? "--"} MB`;

        document.getElementById("net_rx").textContent = mb(j.network?.bytes_recv);
        document.getElementById("net_tx").textContent = mb(j.network?.bytes_sent);

        const disks = j.disk?.items || [];
        const fmtDisk = (d) => {
          if (!d) return "--";
          const label = d.mountpoint || d.device || "disk";
          return `${label} ${d.used_gb ?? "--"}/${d.total_gb ?? "--"} GB`;
        };
        document.getElementById("disk0").textContent = fmtDisk(disks[0]);
        document.getElementById("disk1").textContent = fmtDisk(disks[1]);
      } catch(e){
        document.getElementById("host").textContent = "HOST OFFLINE";
      }
    }

    tick();
    setInterval(tick, 2000);
  </script>
</body>
</html>
